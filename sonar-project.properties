sonar.projectKey=lokeshsharma99_GDS-Demo-App
sonar.organization=lokeshsharma99

sonar.projectName=GDS Demo App
sonar.projectVersion=1.0

# Source files
sonar.sources=src
sonar.exclusions=src/test/**,src/**/*.d.ts,dist/**,node_modules/**,src/main.tsx,src/vite-env.d.ts

# Test files (unit tests only — e2e are Playwright, not Vitest)
sonar.tests=src/test
sonar.test.inclusions=src/test/**/*.test.ts,src/test/**/*.test.tsx
sonar.test.exclusions=src/test/e2e/**

# Coverage report (lcov generated by vitest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.app.json

# Encoding
sonar.sourceEncoding=UTF-8
