name: Allure Report

on:
  # Trigger automatically when the Tests workflow finishes
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue behind the app-only deploy triggered by push; never cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  allure-report:
    name: Generate & Publish Allure Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Build the app so Pages serves it alongside the report ─────────────
      - name: Build app
        run: npm run build
        env:
          VITE_BASE_URL: /GDS-Demo-App/

      # ── Download allure-results produced by the E2E job ───────────────────
      - name: Download allure-results (workflow_run trigger)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Download latest available allure-results when triggered manually
      - name: Download allure-results (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # ── Generate the Allure HTML report ───────────────────────────────────
      - name: Set up Java (required by allure-commandline)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Allure HTML report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            npx allure generate allure-results --clean -o dist/allure-report
            echo "Allure report generated successfully"
          else
            echo "No allure-results found — creating placeholder page"
            mkdir -p dist/allure-report
            cat > dist/allure-report/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="UTF-8"><title>Allure Report</title>
          <style>body{font-family:arial,sans-serif;padding:40px;color:#0b0c0c}
          h1{color:#1d70b8}</style></head>
          <body><h1>No test results available yet</h1>
          <p>Run the <strong>Tests</strong> workflow to generate an Allure report.</p>
          <p><a href="../">Back to application</a></p>
          </body></html>
          EOF
          fi
        continue-on-error: true

      # ── Deploy app + Allure report together as one Pages artifact ─────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report URL
        run: |
          echo "### Allure Report Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Report URL:** https://lokeshsharma99.github.io/GDS-Demo-App/allure-report/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
