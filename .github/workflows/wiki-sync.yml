name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Push wiki pages to GitHub wiki
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Clone the wiki repo using GITHUB_TOKEN
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki-repo || \
            (mkdir wiki-repo && cd wiki-repo && git init && git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git")

          # Copy wiki files
          cp wiki/*.md wiki-repo/

          cd wiki-repo
          git add .
          git diff --cached --quiet && echo "No wiki changes" && exit 0
          git commit -m "Sync wiki from main repo [skip ci]"
          git push origin HEAD:master || git push origin HEAD:main
